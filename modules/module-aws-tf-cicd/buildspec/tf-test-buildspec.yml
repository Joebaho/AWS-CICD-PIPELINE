version: 0.2

# ── Terraform Test Framework ───────────────────────────────────
# Runs unit, integration, and e2e tests using native terraform test

phases:
  install:
    runtime-versions:
      golang: 1.21
    commands:
      - echo "Installing Terraform..."
      - wget -q https://releases.hashicorp.com/terraform/${TF_VERSION:-1.11.3}/terraform_${TF_VERSION:-1.11.3}_linux_amd64.zip
      - unzip -q terraform_${TF_VERSION:-1.11.3}_linux_amd64.zip
      - mv terraform /usr/local/bin/terraform
      - terraform version

  pre_build:
    commands:
      - echo "Initializing Terraform..."
      - terraform init
          -backend-config="bucket=${TF_STATE_BUCKET}"
          -backend-config="key=tests/terraform.tfstate"
          -backend-config="region=${AWS_DEFAULT_REGION}"
          -backend-config="dynamodb_table=${TF_LOCK_TABLE}"
          -reconfigure

  build:
    commands:
      - echo "Running Terraform tests..."
      - terraform test -verbose

  post_build:
    commands:
      - echo "Terraform tests completed with exit code $CODEBUILD_BUILD_SUCCEEDING"

artifacts:
  files:
    - "**/*"
  discard-paths: no
